<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Companies — Intern Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%237a3545'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='14' font-family='sans-serif'>IT</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="masthead">
  <div class="masthead-inner">
    <div class="brand">
      <div>
        <h1>Intern Tracker</h1>
        <p class="brand-sub">application progress</p>
      </div>
    </div>
    <nav class="tabs">
      <a href="index.html" class="tab active">Companies</a>
      <a href="calendar.html" class="tab">Calendar</a>
    </nav>
    <div class="header-right">
      <span class="sync-dot" id="syncDot" title="Sync status"></span>
      <button class="icon-btn" id="settingsBtn" title="Telegram sync">Settings</button>
    </div>
  </div>
</header>

<main class="page">
  <section class="board-head">
    <div class="page-title">
      <h2 class="strip-label">Companies</h2>
      <p class="strip-sub">tracked internship sources</p>
    </div>
    <div class="stats" id="stats"></div>
    <div class="board-controls">
      <input type="search" id="searchBox" class="search" placeholder="Search companies…" autocomplete="off">
      <select id="atsFilter" class="ats-filter"><option value="">All platforms</option></select>
    </div>
  </section>

  <section class="board" id="board" aria-live="polite"></section>
</main>

<footer class="foot">
  <span><span id="companyCount"></span> companies tracked</span>
</footer>

<dialog id="settingsModal" class="modal">
  <form method="dialog" class="modal-card">
    <h2 class="modal-title">Telegram sync</h2>
    <p class="modal-hint">Data syncs to a pinned message in your Telegram chat so reminders and all devices stay in sync.</p>
    <label class="field"><span>Bot token</span><input type="password" id="tgToken" placeholder="123456:ABC…" autocomplete="off"></label>
    <label class="field"><span>Chat ID</span><input type="text" id="tgChat" placeholder="6062137847" autocomplete="off"></label>
    <div class="modal-actions">
      <button type="button" class="btn ghost" id="testSyncBtn">Send test</button>
      <button type="submit" class="btn solid" id="saveSyncBtn">Save</button>
    </div>
    <p class="modal-status" id="syncStatusMsg"></p>
  </form>
</dialog>

<div class="toast" id="toast"></div>

<script src="assets/app.js"></script>
<script>App.initBoard();</script>
</body>
</html>
