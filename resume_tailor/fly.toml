app = "resume-tailor"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  OPENAI_MODEL = "gpt-4o-mini"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
